<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Maalu ❤️</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

/* Main container */

.container{
margin-top:100px;
position:relative;
z-index:10;
}

h1{
font-size:45px;
}

h2{
font-weight:normal;
}

/* Buttons */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
transition:0.3s;
}

button:hover{
background:#ff1e56;
transform:scale(1.05);
}

/* Proposal section */

#proposal{
display:none;
font-size:26px;
margin-top:20px;
}

/* Cake animation */

.cake{
font-size:90px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* Floating hearts */

.heart{
position:absolute;
font-size:20px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<!-- Romantic background music -->

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c2c8c1d07.mp3?filename=romantic-love-11786.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>🎂 Happy Birthday Maalu 🎂</h1>

<div class="cake">🎂</div>

<h2>You make my life beautiful every single day 💖</h2>

<button onclick="showProposal()">Open Your Surprise 🎁</button>

<div id="proposal">

<p>Maalu ❤️</p>

<p>On your special day I want to say something…</p>

<p>You are the most beautiful part of my life ✨</p>

<p>Will you stay with me forever? 💍</p>

<button onclick="yesClick()">Yes 💖</button>

<button onclick="yesClick()">Forever Yes 💍</button>

<p id="answer"></p>

</div>

</div>

<script>

/* Show proposal */

function showProposal(){
document.getElementById("proposal").style.display="block";
}

/* Yes button response */

function yesClick(){
document.getElementById("answer").innerHTML="💖 Yay! I love you Maalu! 💖";
}

/* Floating hearts animation */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+10)+"px";

heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
