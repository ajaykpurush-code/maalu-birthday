<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Maalu ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

.container{
margin-top:100px;
position:relative;
z-index:10;
}

h1{font-size:45px;}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
transition:0.3s;
}

button:hover{
background:#ff1e56;
transform:scale(1.05);
}

#proposal{
display:none;
font-size:26px;
margin-top:20px;
}

/* cake animation */

.cake{
font-size:90px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* floating hearts */

.heart{
position:absolute;
font-size:20px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* kiss gif */

#kiss{
display:none;
margin-top:20px;
width:150px;
animation:pop 0.8s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* glowing love text */

#forever{
display:none;
font-size:40px;
margin-top:20px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #fff,0 0 20px #ff4d6d,0 0 40px #ff1e56;
}

/* fireworks */

.firework{
position:absolute;
font-size:30px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c2c8c1d07.mp3">
</audio>

<div class="container">

<h1>🎂 Happy Birthday Maalu 🎂</h1>

<div class="cake">🎂</div>

<h2>You make my life beautiful every single day 💖</h2>

<button onclick="showProposal()">Open Your Surprise 🎁</button>

<div id="proposal">

<p>Maalu ❤️</p>

<p>You are the most beautiful part of my life ✨</p>

<p>Will you stay with me forever? 💍</p>

<button onclick="yesClick()">Yes 💖</button>

<button id="noBtn">No 😜</button>

<p id="answer"></p>

<img id="kiss" src="https://media.tenor.com/0AVbKGY_MxMAAAAi/love-kiss.gif">

<div id="forever">Maalu ❤️ Ajay Forever</div>

</div>

</div>

<script>

/* show proposal */

function showProposal(){
document.getElementById("proposal").style.display="block";
}

/* yes click */

function yesClick(){

document.getElementById("answer").innerHTML="💖 Yay! I love you Maalu! 💖";

document.getElementById("kiss").style.display="block";

document.getElementById("forever").style.display="block";

/* fireworks */

for(let i=0;i<30;i++){
createFirework();
}

}

/* fireworks animation */

function createFirework(){

const fire=document.createElement("div");

fire.className="firework";

fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>{
fire.remove();
},1000);

}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+10)+"px";

heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,300);

/* No button running away */

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-100);

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

</script>

</body>
</html>
